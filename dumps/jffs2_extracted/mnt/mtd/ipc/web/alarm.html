<script type="text/javascript">
function on_load()
{
	if (audioflag == 0) {
		document.getElementById("relay").style.display = "none";
		document.getElementById("snap").style.display = "none";
		document.getElementById("record").style.display = "none";
	}

	load_form_md_email();    
	load_form_md_record();   
	load_form_md_relay();         
	load_form_relaytime();
	load_form_md_snap();     
    load_form_md_ftpsnap();
	load_form_md_preset();
	load_form_md_presetindex();
	load_form_snap_num();
	
}


function do_submit()
{
	var s = document.getElementById("form_submit");	

	s.cururl.value = document.URL;

	submit_form_md_email();
	submit_form_md_record();
	submit_form_md_relay();
     submit_form_md_snap();
	submit_form_md_snap();
	submit_form_relaytime();
	submit_form_md_ftpsnap();
	submit_form_md_preset();
	submit_form_md_presetindex();
	submit_form_snap_num();
	s.ids0.name  = "-aname";
	s.turn0.name = "-switch";
    s.ids3.name  = "-aname";
	s.ids5.name  = "-aname";
	s.turn3.name = "-switch";
	s.turn5.name = "-switch";
	s.ids6.name  = "-aname";
	s.turn6.name = "-switch";
	s.ids7.name  = "-aname";
	s.turn7.name = "-switch";
	s.time.name  = "-time";
	s.ids4.name   = "-aname";
	s.turn4.name  = "-switch";
	s.ids2.name   = "-aname";
	s.turn2.name  = "-switch";
	s.snapnum.name  = "-snap_count";
	s.index.name = "-alarmpresetindex";
	s.action="cgi-bin/hi3510/param.cgi";
	s.submit();
}
</script>
