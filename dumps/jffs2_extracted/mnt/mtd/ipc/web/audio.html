<script type="text/javascript">

function on_load()
{
	load_form_aeswitch1();
	load_form_aeformat1();
	load_form_aeswitch2();
	load_form_aeformat2();
	
	load_form_volumein();
	load_form_volumeout();
	load_form_volintype();
	
}
function do_submit()
{
	var s = document.getElementById("form_submit");
	s.cururl.value =document.URL;
	
	if (!check_form_volumein())
		return false;	
	if (!check_form_volumeout())
		return false;
	
	s.chn0.value = 11;
	
	submit_form_aeswitch1();
	
	s.chn1.value = 11;
	
	submit_form_aeformat1();

	s.chn2.value = 12;
	
	submit_form_aeswitch2();
	
	s.chn3.value = 12;
	
	submit_form_aeformat2();
	
	


	submit_form_volumein();
	submit_form_volumeout();
	submit_form_volintype();
	
	
	s.chn0.name  = "-chn";
	s.chn1.name  = "-chn";
	s.chn2.name  = "-chn";
	s.chn3.name  = "-chn";

	s.aeswitch_1.name = "-aeswitch";
	s.aeformat_1.name  = "-aeformat";
	s.aeswitch_2.name = "-aeswitch";
	s.aeformat_2.name  = "-aeformat";

	s.volume.name = "-volume";
	s.ao_volume.name = "-volume";
	s.volin_type.name = "-volin_type";
	
	s.action = "cgi-bin/hi3510/param.cgi";
	s.submit();
}
</script>
