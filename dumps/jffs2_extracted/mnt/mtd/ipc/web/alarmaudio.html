{

	s.cururl.value=document.URL;

	submit_form_aaenable();
	submit_form_aavalue();
	
	s.action="cgi-bin/hi3510/param.cgi";
	s.submit();
}
</script>

  </tr>
  <tr>
    <td>
	<script type="text/javascript">document.write(str_alarmaudio + colon);</script>
