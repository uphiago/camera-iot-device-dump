function do_submit()
{
	var f = document.getElementById("form_vinorm");

	// P N 不同制式 cgi提交要不同的顺序
	if (f.value == "50")
	{
		document.form3.id = "form_submit";
	}
	else
	{
		document.form2.id = "form_submit";
	}
	
	var s = document.getElementById("form_submit");
	
	// 检测帧率与制式是否冲突
	if (!check_form_fps1())
		return false;
	if (!check_form_fps2())
		return false;	
	//if (!check_form_fps3())
		//return false;	
	// 主帧间隔范围检?
	if (!check_form_gop1())
		return false;
	if (!check_form_gop2())
		return false;
	
	//码率范围检?
	if (!check_form_bps1())
		return false;
	if (!check_form_bps2())
		return false;

				
	s.cururl.value = document.URL;

	submit_form_videomode();	
	submit_form_profile();

	s.chn1.name  = "-chn";

	submit_form_fps1();	
	submit_form_brmode1();
	submit_form_gop1();
	submit_form_imagegrade1();

	submit_form_brmode2();	
	submit_form_gop2();
	submit_form_imagegrade2();
	
	s.action="cgi-bin/hi3510/param.cgi";
  	s.submit();
   	return true;
