<script type="text/javascript">
function on_load()
{	
	load_form_ftserver();
	load_form_ftport();
	load_form_ftusername();
	load_form_ftpassword();
	load_form_ftmode();
	load_form_ftpath();
	load_form_autocreatedir();
}


function do_submit()
{
	var s = document.getElementById("form_submit");
	
	if (!check_form_ftserver())
		return false;
	if (!check_form_ftport())
		return false;
	if (!check_form_ftusername())
		return false;
	if (!check_form_ftpassword())	
		return false;
	if (!check_form_ftpath())	
		return false;	

	submit_form_ftserver();
	submit_form_ftport();
	submit_form_ftusername();
	submit_form_ftpassword();
	submit_form_ftmode();
	submit_form_ftpath();
	submit_form_autocreatedir();

	s.cururl.value = document.URL;
	s.action = "cgi-bin/hi3510/param.cgi";
	s.submit();
}

</script>
