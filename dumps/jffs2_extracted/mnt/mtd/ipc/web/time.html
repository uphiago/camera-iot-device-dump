function Watch()
{
    now=new Date(); 
    year=now.getYear();
    month=now.getMonth()+1;
    day=now.getDate();
    hour=now.getHours();
    minute=now.getMinutes();
    second=now.getSeconds();
    if(year<1000) year+=1900;
    if(hour<10) hour="0"+hour;
    if(month<10) month="0"+month;
    if(day<10) day="0"+day;
    if(minute<10) minute="0"+minute;
    if(second<10) second="0"+second;
    document.form1.pctime.value=year+'-'+month+'-'+day+' '+hour+':'+minute+':'+second;;
    webWatchUp();
    setTimeout("Watch()",1000);
}

function tz_setvar()
{
    var re=/[\+\-0-9]/;
    var start=TimeZone.search(re);
    var end;
    
    g_tz_hour=0;
    g_tz_minute=0;
    g_tzdl_hour=0;
    g_tzdl_minute=0;
    g_tzdl_select=0;

    if(-1==start)
    {
    }
    else
    {
        g_tz_hour=TimeZone.substr(start);
        re=/[A-Z a-z]/;
        end=g_tz_hour.search(re);
        if(-1==end)
        {
        }
        else
        {
            var tzdl_start;
            g_tzdl_hour=g_tz_hour.substr(end);
            
            g_tzdl_select=true;
            re=/,/;

            {
                g_tzdl_minutes=g_tzdl_minutes.substring(0,tzdl_start);
            }
            re=/[\+\-0-9]/;
            tzdl_start=g_tzdl_hour.search(re);
            g_tzdl_hour=g_tzdl_hour.substr(tzdl_start);
            re=/:/
            tzdl_start=g_tzdl_hour.search(re);
            if(-1==tzdl_start)
            {
            }
            else
            {
                g_tzdl_minute=g_tzdl_hour.substr(tzdl_start+1);
                g_tzdl_hour=g_tzdl_hour.substring(0,tzdl_start);
            }
            g_tz_hour=g_tz_hour.substring(0,end);
        }
        
        re=/:/;
        end=g_tz_hour.search(re);

        }

            g_tz_hour=g_tz_hour.substring(0,end);
        }
    }
}

function checkdatevalid(year,month,day)
{
	var dd=0;
  var amari = 0;
  var amari1 = 0;
  var amari4 = 0;
	switch(month){
		case "01":
		case "03":
		case "05":
		case "07":
		case "08":
		case "10":
		case "12":
		dd=31;
		break;
		case "04":
		case "06":
		case "09":
		case "11":
		dd=30;
		break;
		case "02":
		amari=year%4;
		amari1=year%100;
		amari4=year%400;
		if(amari4==0){
			dd=29;
		}else if(amari1==0){
			dd=28;
		}
		else if(amari==0){
			dd=29;
		}else{
			dd=28;
		}
		break;
	}
	
	if(dd<day){
		return false;
	}
	return true;
}
