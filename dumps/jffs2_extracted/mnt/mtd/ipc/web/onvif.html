<script type="text/javascript">
function on_load()
{
	load_form_enable();
	load_form_port();
	load_form_authflag();
	load_form_forbitset();
	load_form_onvifchn();
	load_form_onvifsnap();
	load_form_onvifnvctype();
	change_form_enable();
}

	
function do_submit()
{
	var s = document.getElementById("form_submit");
	
	s.cururl.value=document.URL;
	submit_form_enable();
	submit_form_port();
	submit_form_authflag();
	submit_form_forbitset();
	submit_form_onvifchn();
	submit_form_onvifsnap();
	submit_form_onvifnvctype();
	if (!check_form_port())
		return false;
		
	
   if((s.enable.value != ov_enable)||(s.authflag.value != ov_authflag)||(s.port.value != ov_port)||(s.forbitset.value != ov_forbitset)||(s.subchn.value != ov_subchn)||(s.snapchn.value != ov_snapchn)||(s.nvctype.value != ov_nvctype))
   {	
	alert(str_note_needreset1);		
   }

	s.enable.name = "-ov_enable";
	s.port.name  = "-ov_port";
	s.authflag.name = "-ov_authflag";
	s.forbitset.name = "-ov_forbitset";
	s.subchn.name = "-ov_subchn";
	s.snapchn.name = "-ov_snapchn";
	s.nvctype.name = "-ov_nvctype";
	s.action="cgi-bin/hi3510/param.cgi";
	s.submit();
}
</script>
