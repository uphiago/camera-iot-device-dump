<script type="text/javascript">
function on_load()
{  
	if (audioflag == 0) {
		document.getElementById("savesd").style.display = "none";
		document.getElementById("savesds").style.display = "none";
		
	} 
	
	load_form_asinterval();
	load_form_astype(); 
}

function do_submit()
{
	var s = document.getElementById("form_submit");

	if (!check_form_asinterval1())
		return false;
    if (!check_form_asinterval2())
		return false;
	if (!check_form_asinterval3())
		return false;

	submit_form_asinterval();
	submit_form_astype();
	
	
	s.cururl.value=document.URL;
	s.action="cgi-bin/hi3510/param.cgi";
	s.submit();
}
</script>
