function on_load()
{
	load_form_dhcpflag();
	load_form_ipaddr();
	load_form_netmask();
	load_form_gateway();
	load_form_dnsstat();
	load_form_fdnsip();
	load_form_sdnsip();
	load_form_httpport();
	load_form_rtspport();
	load_form_rtmpport();
	load_form_rtsp_aenable();
		
	change_form_dhcpflag();
}

function alertChang()
{
	alert(str_note_ipportchange);
}

function do_submit()
{	
	var s = document.getElementById("form_submit");
	var r = document.getElementById("form_rtspport");

	s.cururl.value =document.URL;
	
	if (!check_form_dhcpflag())
		return false;
	if (!check_form_dnsstat())
		return false;
	if (!check_form_httpport())
		return false;
	if (!check_form_rtspport())
		return false;
	if (!check_form_ip2gateway())
		return false;
		
	submit_form_dhcpflag();
	submit_form_ipaddr();
	submit_form_netmask();
	submit_form_gateway();
	submit_form_dnsstat();
	submit_form_fdnsip();
	submit_form_sdnsip();
	submit_form_httpport();
	submit_form_rtspport();
	submit_form_rtmpport();
	submit_form_rtsp_aenable();
	
	if (s.httpport.value == s.rtspport.value)
	{
		alert(str_err_port + comma + str_note_rhportsame);
		r.select();
		return false;  
	}
	
if ((s.ipaddr.value != ip) || 
		(s.dhcp.value != dhcpflag) ||
		(s.httpport.value != httpport) || 
		(s.rtspport.value != rtspport)||
		(s.rtmpport.value != rtmpport))
	{
		alertChang();
	}	
	s.dhcp.name = "-dhcp";
	s.ipaddr.name  = "-ipaddr";
	s.netmask.name  = "-netmask";
	s.gateway.name = "-gateway";
	s.dnsstat.name = "-dnsstat";	
	s.fdnsip.name  = "-fdnsip";
	s.sdnsip.name  = "-sdnsip";
	s.httpport.name  = "-httpport";
	s.rtspport.name  = "-rtspport";
	s.rtmpport.name  = "-rtmpport";
	s.rtsp_aenable.name = "-rtsp_aenable";
	s.action="cgi-bin/hi3510/param.cgi";
	s.submit();	
}

</script>
