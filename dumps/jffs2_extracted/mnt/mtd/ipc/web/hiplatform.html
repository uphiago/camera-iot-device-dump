<script type="text/javascript">
function on_load()
{
	load_form_enable();
	load_form_uid();
	change_form_enable();	
}

	
function do_submit()
{
	var s = document.getElementById("form_submit");
	
	s.cururl.value=document.URL;	
	submit_form_enable();

	
	if(s.enable.value != hip2p_enable)
   {	
	alert(str_note_needreset1);		
   }
	
	s.enable.name = "-hip2p_enable";

	
	s.action="cgi-bin/hi3510/param.cgi";
	s.submit();
}
</script>

  </tr>
